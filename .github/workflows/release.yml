name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  verify:
    name: Verify
    # Custom skip marker: `[skip ci on main]` silences `release.yml` on its
    # own release commit without blocking other workflows (the native GitHub
    # `[skip ci]` would also skip the `push: tags` event that triggers
    # `publish-assets.yml`).
    if: ${{ !contains(github.event.head_commit.message, '[skip ci on main]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --locked

  release:
    name: Release
    if: ${{ !contains(github.event.head_commit.message, '[skip ci on main]') }}
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Needed so @semantic-release/git can push the release commit AND
          # the tag. We use RELEASE_TOKEN (a PAT) here so the `push: tags`
          # event on `vX.Y.Z` cascades to `publish-assets.yml`. The default
          # GITHUB_TOKEN does NOT cascade to other workflows (GitHub
          # anti-recursion safeguard).
          token: ${{ secrets.RELEASE_TOKEN }}
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install semantic-release
        run: |
          npm install --no-save \
            semantic-release@^24 \
            @semantic-release/commit-analyzer@^13 \
            @semantic-release/release-notes-generator@^14 \
            @semantic-release/changelog@^6 \
            @semantic-release/exec@^7 \
            @semantic-release/git@^10 \
            @semantic-release/github@^11 \
            semantic-release-replace-plugin@^1

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: npx semantic-release
